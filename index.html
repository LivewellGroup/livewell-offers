<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾旅 LIVEWELL — 全球免費住宿夜精選 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --black: #1C1C1C;
    --white: #F5F1EC;
    --gold: #C9B99A;
    --gold-dark: #A89476;
    --navy: #2C5F74;
    --navy-dark: #1F4856;
    --linen: #E2D9CE;
    --teak: #7A6652;
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --border: rgba(28,28,28,0.12);
    --border-strong: rgba(28,28,28,0.2);
    --text-secondary: #5F5E5A;
    --text-tertiary: #B4B2A9;
    --bg-secondary: #F7F4F0;
    --bg-cream: #EFE9E0;
    --shadow-sm: 0 2px 12px rgba(28,28,28,0.06);
    --shadow-md: 0 8px 32px rgba(28,28,28,0.1);
    --shadow-lg: 0 20px 60px rgba(28,28,28,0.18);
  }
  
  html, body { height: 100%; }
  body {
    font-family: 'Noto Serif TC', 'Songti TC', 'Georgia', serif;
    background: linear-gradient(135deg, #2a2724 0%, #1a1816 100%);
    color: var(--black);
    overflow: hidden;
    user-select: none;
  }
  .sans { font-family: -apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif; }
  
  /* ── Book stage ── */
  .book-stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 2400px;
  }
  
  .book {
    position: relative;
    width: min(94vw, 920px);
    height: min(88vh, 660px);
    transform-style: preserve-3d;
  }
  
  /* ── Page ── */
  .page {
    position: absolute;
    inset: 0;
    background: var(--white);
    box-shadow: var(--shadow-lg);
    border-radius: 4px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    display: flex;
    flex-direction: column;
  }
  .page.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 5;
  }
  .page.flipping-out {
    animation: flipOut 0.6s ease forwards;
    transform-origin: left center;
    z-index: 6;
  }
  .page.flipping-in {
    animation: flipIn 0.6s ease forwards;
    transform-origin: left center;
    z-index: 5;
  }
  .page.flipping-out-back {
    animation: flipOutBack 0.6s ease forwards;
    transform-origin: right center;
    z-index: 6;
  }
  .page.flipping-in-back {
    animation: flipInBack 0.6s ease forwards;
    transform-origin: right center;
    z-index: 5;
  }
  @keyframes flipOut {
    0% { transform: rotateY(0); opacity: 1; }
    100% { transform: rotateY(-180deg); opacity: 0; }
  }
  @keyframes flipIn {
    0% { transform: rotateY(180deg); opacity: 0; }
    100% { transform: rotateY(0); opacity: 1; }
  }
  @keyframes flipOutBack {
    0% { transform: rotateY(0); opacity: 1; }
    100% { transform: rotateY(180deg); opacity: 0; }
  }
  @keyframes flipInBack {
    0% { transform: rotateY(-180deg); opacity: 0; }
    100% { transform: rotateY(0); opacity: 1; }
  }
  
  .page-inner {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 3rem 3.5rem 2rem;
    scrollbar-width: thin;
    scrollbar-color: var(--text-tertiary) transparent;
  }
  .page-inner::-webkit-scrollbar { width: 6px; }
  .page-inner::-webkit-scrollbar-track { background: transparent; }
  .page-inner::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
  
  /* ── Cover (page 0) ── */
  .cover {
    background: linear-gradient(180deg, #FBF8F3 0%, #EFE9E0 100%);
    position: relative;
  }
  .cover::before {
    content: '';
    position: absolute;
    inset: 18px;
    border: 0.5px solid var(--gold);
    pointer-events: none;
  }
  .cover-inner {
    position: relative;
    height: 100%;
    padding: 4rem 3.5rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 1;
  }
  .cover-top { display: flex; flex-direction: column; gap: 0.8rem; }
  .cover-eyebrow {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--green-dark);
    font-weight: 500;
  }
  .cover-brand {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--text-secondary);
  }
  .cover-center {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .cover-zh {
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: var(--black);
    font-weight: normal;
    margin-bottom: 1.4rem;
  }
  .cover-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--teak);
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
    max-width: 540px;
    line-height: 1.35;
  }
  .cover-mark {
    width: 56px;
    height: 0.5px;
    background: var(--gold-dark);
    margin-bottom: 1.5rem;
  }
  .cover-tagline {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.85;
    max-width: 520px;
  }
  .cover-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .cover-meta {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    line-height: 1.7;
  }
  .cover-partners {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    color: var(--text-tertiary);
    text-align: right;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1.8;
  }
  
  /* ── Featured page ── */
  .featured-page { background: #FFFEFB; overflow: hidden; }
  
  /* 左圖右文兩欄佈局 */
  .featured-layout {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .featured-img-col {
    width: 40%;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .featured-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    transition: transform 8s ease;
  }
  .featured-img-col:hover .featured-img { transform: scale(1.05); }
  .featured-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 50%, rgba(255,254,251,0.18) 100%);
    pointer-events: none;
  }
  .featured-img-fallback {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, var(--bg-cream) 0%, var(--linen) 100%);
  }
  .featured-img-credit {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-family: -apple-system, sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.08em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .featured-text-col {
    flex: 1;
    overflow-y: auto;
    padding: 2.6rem 2.8rem 1.4rem 2.4rem;
    scrollbar-width: thin;
    scrollbar-color: var(--text-tertiary) transparent;
    display: flex;
    flex-direction: column;
  }
  .featured-text-col::-webkit-scrollbar { width: 4px; }
  .featured-text-col::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }
  .featured-eyebrow {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--green-dark);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 0.6rem;
  }
  .featured-num {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 1.2rem;
    letter-spacing: 0.08em;
  }
  .featured-tagline {
    font-size: 15px;
    color: var(--gold-dark);
    font-style: italic;
    margin-bottom: 0.4rem;
    letter-spacing: 0.04em;
  }
  .featured-name-zh {
    font-size: 38px;
    line-height: 1.2;
    color: var(--black);
    margin-bottom: 0.4rem;
    font-weight: normal;
  }
  .featured-name-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
  }
  .featured-loc {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 1.6rem;
  }
  .featured-divider { width: 40px; height: 0.5px; background: var(--gold); margin-bottom: 1.6rem; }
  .featured-desc {
    font-size: 15.5px;
    line-height: 1.85;
    color: var(--black);
    margin-bottom: 1.8rem;
    max-width: 640px;
  }
  .featured-card {
    background: linear-gradient(180deg, #FAF6F0 0%, #F2EBE0 100%);
    border: 0.5px solid var(--border);
    border-left: 2px solid var(--gold);
    padding: 1.4rem 1.6rem;
    margin-bottom: 1.4rem;
    max-width: 580px;
  }
  .featured-card-label {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .featured-plan {
    font-size: 22px;
    color: var(--black);
    margin-bottom: 0.3rem;
  }
  .featured-plan-desc {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 0.9rem;
  }
  .featured-period {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .featured-foot {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }
  .source-badge {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 5px 11px;
    border-radius: 99px;
    border: 0.5px solid currentColor;
    font-weight: 500;
  }
  .source-virtuoso { color: var(--navy); background: rgba(44,95,116,0.06); }
  .source-leading { color: var(--green-dark); background: rgba(15,110,86,0.06); }
  .featured-link {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--navy);
    text-decoration: none;
    border-bottom: 0.5px solid var(--navy);
    padding-bottom: 1px;
    letter-spacing: 0.04em;
  }
  .featured-link:hover { color: var(--green-dark); border-color: var(--green-dark); }
  
  /* ── TOC page ── */
  .toc-eyebrow {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .toc-title {
    font-size: 36px;
    color: var(--black);
    margin-bottom: 0.3rem;
    font-weight: normal;
  }
  .toc-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 1.4rem;
  }
  .toc-divider { width: 40px; height: 0.5px; background: var(--gold); margin-bottom: 2rem; }
  .toc-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    padding: 1rem 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: padding 0.25s ease;
  }
  .toc-item:hover { padding-left: 0.6rem; }
  .toc-item:hover .toc-region-zh { color: var(--green-dark); }
  .toc-num {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-tertiary);
    width: 30px;
    flex-shrink: 0;
  }
  .toc-region-zh {
    font-size: 22px;
    color: var(--black);
    transition: color 0.25s ease;
    flex-shrink: 0;
  }
  .toc-region-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-tertiary);
    margin-left: 0.4rem;
  }
  .toc-dots {
    flex: 1;
    border-bottom: 0.5px dotted var(--text-tertiary);
    height: 1px;
    margin: 0 0.6rem;
    transform: translateY(-4px);
  }
  .toc-meta {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }
  
  /* ── Region intro page ── */
  .region-intro-page {
    background: linear-gradient(180deg, #FBF8F3 0%, #F2EBE0 100%);
  }
  .region-intro-inner {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 3rem 4rem;
  }
  .region-intro-num {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--green-dark);
    letter-spacing: 0.18em;
    margin-bottom: 1.2rem;
  }
  .region-intro-zh {
    font-size: 72px;
    line-height: 1.05;
    color: var(--black);
    margin-bottom: 0.6rem;
    font-weight: normal;
    letter-spacing: 0.06em;
  }
  .region-intro-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--teak);
    letter-spacing: 0.04em;
    margin-bottom: 2.2rem;
  }
  .region-intro-mark {
    width: 60px;
    height: 0.5px;
    background: var(--gold-dark);
    margin-bottom: 2rem;
  }
  .region-intro-stats {
    display: flex;
    gap: 3rem;
    margin-bottom: 2rem;
  }
  .stat-item {}
  .stat-num {
    font-size: 38px;
    color: var(--black);
    font-weight: normal;
    line-height: 1;
    margin-bottom: 0.4rem;
  }
  .stat-label {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .region-intro-countries {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 2;
    max-width: 580px;
  }
  .region-intro-quote {
    font-style: italic;
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.85;
    border-left: 2px solid var(--gold);
    padding-left: 1.2rem;
    max-width: 540px;
    margin-top: 1.6rem;
  }
  
  /* ── Hotels listing page ── */
  .listing-header {
    margin-bottom: 1.4rem;
    padding-bottom: 1.2rem;
    border-bottom: 0.5px solid var(--border);
  }
  .listing-eyebrow {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .listing-title {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .listing-zh {
    font-size: 28px;
    color: var(--black);
    font-weight: normal;
  }
  .listing-en {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-tertiary);
  }
  .listing-count {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: auto;
    letter-spacing: 0.06em;
  }
  
  .hotel-card {
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 0.9rem;
    background: #fff;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .hotel-card:hover {
    border-color: var(--gold);
    box-shadow: var(--shadow-sm);
  }
  .hotel-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.6rem;
  }
  .hotel-name {
    font-size: 17px;
    color: var(--black);
    line-height: 1.35;
    flex: 1;
  }
  .hotel-city {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 0.7rem;
  }
  .hotel-plan {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: var(--green-dark);
    font-weight: 500;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }
  .hotel-period {
    font-family: -apple-system, sans-serif;
    font-size: 11.5px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 0.6rem;
  }
  .hotel-desc {
    font-family: -apple-system, sans-serif;
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 0.8rem;
  }
  .hotel-foot {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    padding-top: 0.6rem;
    border-top: 0.5px solid var(--border);
  }
  .hotel-link {
    font-family: -apple-system, sans-serif;
    font-size: 11.5px;
    color: var(--navy);
    text-decoration: none;
    border-bottom: 0.5px solid var(--navy);
    padding-bottom: 1px;
    letter-spacing: 0.04em;
    margin-left: auto;
  }
  .hotel-link:hover { color: var(--green-dark); border-color: var(--green-dark); }
  
  /* ── Country sub-nav ── */
  .country-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding-bottom: 1rem;
    margin-bottom: 1.4rem;
    border-bottom: 0.5px solid var(--border);
  }
  .country-pill {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 5px 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .country-pill:hover { color: var(--black); border-color: var(--gold); }
  .country-pill.active {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }
  .country-pill .pill-count {
    font-size: 10px;
    margin-left: 4px;
    color: var(--text-tertiary);
  }
  .country-pill.active .pill-count { color: var(--gold); }
  
  /* ── Page footer ── */
  .page-footer {
    flex-shrink: 0;
    padding: 0.9rem 3.5rem;
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.5);
  }
  .footer-brand {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.16em;
  }
  .footer-page {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--text-tertiary);
  }
  
  /* ── Navigation arrows ── */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(245,241,236,0.95);
    border: 0.5px solid var(--border);
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: all 0.25s ease;
    box-shadow: var(--shadow-md);
  }
  .nav-arrow:hover {
    background: var(--white);
    transform: translateY(-50%) scale(1.06);
  }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-arrow.prev { left: max(20px, calc(50vw - 540px)); }
  .nav-arrow.next { right: max(20px, calc(50vw - 540px)); }
  .nav-arrow svg { width: 18px; height: 18px; stroke: var(--black); fill: none; stroke-width: 1.5; }
  
  /* ── Top bar ── */
  .top-bar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(245,241,236,0.95);
    backdrop-filter: blur(12px);
    padding: 8px 20px;
    border-radius: 99px;
    box-shadow: var(--shadow-md);
    z-index: 50;
    border: 0.5px solid var(--border);
  }
  .top-bar-brand {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-secondary);

// Build pages array
const pages = [];

// Page 0: Cover

// For each region: intro + listing pages
REGION_ORDER.forEach((region) => {
  pages.push({ type: 'region-intro', region: region });
  pages.push({ type: 'region-listing', region: region });
});

let currentPage = 0;
let isFlipping = false;

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function sourceBadge(source) {
  if (source === 'Virtuoso') {
    return '<span class="source-badge source-virtuoso">Virtuoso</span>';
  } else {
    return '<span class="source-badge source-leading">Leading Hotels</span>';
  }
}

          <div class="cover-en">Hotel Offers<br>Collection 2026.</div>
          <div class="cover-mark"></div>
          <div class="cover-tagline">
            艾旅嚴選全球 ${DATA.meta.total} 間頂級酒店，<br>

        </div>
        <div class="cover-bottom">

          <div class="cover-partners">
            Virtuoso<br>

            of the World

  `;
}

function renderFeatured(f, idx) {
  const imgHtml = f.img
    ? `<img class="featured-img" src="${escapeHtml(f.img)}" alt="${escapeHtml(f.name)}" loading="eager" onerror="this.parentNode.innerHTML='<div class=\\'featured-img-fallback\\'></div>'">`
    : `<div class="featured-img-fallback"></div>`;

  return `
    <div class="page featured-page">
      <div class="featured-layout">
        <div class="featured-img-col">
          ${imgHtml}
          <div class="featured-img-overlay"></div>
          ${f.img_credit ? `<span class="featured-img-credit">${escapeHtml(f.img_credit)}</span>` : ''}
        </div>
        <div class="featured-text-col">
          <div class="featured-eyebrow">本月精選 · Editor's Pick</div>
          <div class="featured-num">No. 0${idx + 1} / 02 — ${f.region}</div>
          <div class="featured-tagline">「${escapeHtml(f.tagline)}」</div>
          <h1 class="featured-name-zh">${escapeHtml(f.name_zh)}</h1>
          <div class="featured-name-en">${escapeHtml(f.name)}</div>
          <div class="featured-loc">${escapeHtml(f.city)} · ${escapeHtml(f.country)}</div>
          <div class="featured-divider"></div>
          <p class="featured-desc">${escapeHtml(f.desc)}</p>
          <div class="featured-card">
            <div class="featured-card-label">免費住宿夜方案</div>
            <div class="featured-plan">${escapeHtml(f.plan)}</div>
            <div class="featured-plan-desc">${escapeHtml(f.plan_desc)}</div>
            <div class="featured-period">適用期間 · ${escapeHtml(f.period)}<br><span style="color:var(--text-tertiary);font-style:italic;">${escapeHtml(f.period_en)}</span></div>
          </div>
          <div class="featured-foot">
            ${sourceBadge(f.source)}
            <a href="${escapeHtml(f.url)}" target="_blank" class="featured-link">查看完整方案 →</a>
          </div>
        </div>
      </div>
      <div class="page-footer">
        <span class="footer-brand">艾旅 LIVEWELL · BESPOKE TRAVEL</span>
        <span class="footer-page">${String(currentPage + 1).padStart(2,'0')}</span>
      </div>
    </div>
  `;
}

function renderToc() {
  let items = '';
  REGION_ORDER.forEach((r, i) => {
    const d = DATA.regions[r];
    const pageNum = pages.findIndex(p => p.type === 'region-intro' && p.region === r) + 1;
    items += `
      <div class="toc-item" onclick="goToPage(${pageNum - 1})">
        <span class="toc-num">0${i+1}</span>
        <span class="toc-region-zh">${r}</span>
        <span class="toc-region-en">${REGION_EN[r]}</span>
        <span class="toc-dots"></span>
        <span class="toc-meta">${d.total} 間 · ${Object.keys(d.countries).length} 國</span>
      </div>
    `;
  });
  return `
    <div class="page">
      <div class="page-inner">
        <div class="toc-eyebrow">CONTENTS · 目錄</div>
        <h1 class="toc-title">五大區域 · 精選一覽</h1>
        <div class="toc-en">Browse by Region</div>
        <div class="toc-divider"></div>
        <div class="toc-list">${items}</div>
        <div style="margin-top: 2.4rem; padding-top: 1.4rem; border-top: 0.5px solid var(--border);">
          <div class="sans" style="font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 0.6rem;">PARTNERS · 合作夥伴</div>
          <div style="display:flex; gap: 1.2rem; flex-wrap: wrap;">
            <span class="source-badge source-virtuoso">Virtuoso</span>
            <span class="source-badge source-leading">Leading Hotels</span>
          </div>
          <p class="sans" style="font-size: 12px; color: var(--text-secondary); margin-top: 0.9rem; line-height: 1.7;">
            每一筆優惠皆標註來源聯盟，並附上原始查詢連結。<br>
            欲預訂任一方案，請與您的艾旅旅遊創造師聯繫。
          </p>
        </div>
      </div>
      <div class="page-footer">
        <span class="footer-brand">艾旅 LIVEWELL · BESPOKE TRAVEL</span>
        <span class="footer-page">${String(currentPage + 1).padStart(2,'0')}</span>
      </div>
    </div>
  `;
}

function renderRegionIntro(region) {
  const d = DATA.regions[region];
  const idx = REGION_ORDER.indexOf(region);
  const countriesList = Object.entries(d.countries)
    .sort((a,b) => b[1].count - a[1].count)
    .map(([zh, c]) => `${zh}<span style="color:var(--text-tertiary); font-size:11px; margin-left:3px;">${c.count}</span>`)
    .join('　·　');
  
  return `
    <div class="page region-intro-page">
      <div class="region-intro-inner">
        <div class="region-intro-num">PART 0${idx + 1} / 05 · CHAPTER ${String.fromCharCode(65 + idx)}</div>
        <h1 class="region-intro-zh">${region}</h1>
        <div class="region-intro-en">${REGION_EN[region]}</div>
        <div class="region-intro-mark"></div>
        <div class="region-intro-stats">
          <div class="stat-item">
            <div class="stat-num">${d.total}</div>
            <div class="stat-label">嚴選酒店</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${Object.keys(d.countries).length}</div>
            <div class="stat-label">國家／地區</div>
          </div>
        </div>
        <div class="region-intro-countries">${countriesList}</div>
        <div class="region-intro-quote">${REGION_QUOTE[region]}</div>
      </div>
      <div class="page-footer">
        <span class="footer-brand">艾旅 LIVEWELL · BESPOKE TRAVEL</span>
        <span class="footer-page">${String(currentPage + 1).padStart(2,'0')}</span>
      </div>
    </div>
  `;
}

function renderHotelCard(h) {
  return `
    <div class="hotel-card">
      <div class="hotel-top">
        <div>
          <div class="hotel-name">${escapeHtml(h.name)}</div>
          <div class="hotel-city">${escapeHtml(h.city)}</div>
        </div>
        ${sourceBadge(h.source)}
      </div>
      <div class="hotel-plan">◆ ${escapeHtml(h.plan)}</div>
      ${h.period ? `<div class="hotel-period">適用期間 · ${escapeHtml(h.period)}</div>` : ''}
      ${h.desc ? `<div class="hotel-desc">${escapeHtml(h.desc)}</div>` : ''}
      <div class="hotel-foot">
        ${h.url ? `<a href="${escapeHtml(h.url)}" target="_blank" class="hotel-link">查看完整方案 →</a>` : ''}
      </div>
    </div>
  `;
}

let currentRegionCountry = {};

function renderRegionListing(region) {
  const d = DATA.regions[region];
  const countries = Object.entries(d.countries).sort((a,b) => b[1].count - a[1].count);
  const activeCountry = currentRegionCountry[region] || countries[0][0];
  
  let pills = '';
  countries.forEach(([zh, c]) => {
    pills += `<button class="country-pill ${zh === activeCountry ? 'active' : ''}" data-region="${escapeHtml(region)}" data-country="${escapeHtml(zh)}">${zh}<span class="pill-count">${c.count}</span></button>`;
  });
  
  const activeData = d.countries[activeCountry];
  let cards = '';
  activeData.hotels.forEach(h => { cards += renderHotelCard(h); });
  
  return `
    <div class="page">
      <div class="page-inner">
        <div class="listing-header">
          <div class="listing-eyebrow">PART 0${REGION_ORDER.indexOf(region) + 1} · ${REGION_EN[region]}</div>
          <div class="listing-title">
            <span class="listing-zh">${region} · ${activeCountry}</span>
            <span class="listing-en">${activeData.en}</span>
            <span class="listing-count">${activeData.count} HOTELS</span>
          </div>
        </div>
        <div class="country-nav">${pills}</div>
        <div>${cards}</div>
      </div>
      <div class="page-footer">
        <span class="footer-brand">艾旅 LIVEWELL · BESPOKE TRAVEL</span>
        <span class="footer-page">${String(currentPage + 1).padStart(2,'0')}</span>
      </div>
    </div>
  `;
}

function setCountry(region, country) {
  currentRegionCountry[region] = country;
  // Re-render the listing page in place (no flip animation for sub-nav)
  const book = document.getElementById('book');
  const oldPage = book.querySelector('.page.active');
  if (!oldPage) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderRegionListing(region);
  const newPage = wrapper.firstElementChild;
  newPage.classList.add('active');
  oldPage.replaceWith(newPage);
  // Scroll to top of new page
  newPage.querySelector('.page-inner').scrollTop = 0;
}

function renderPage(pageDef) {
  switch(pageDef.type) {
    case 'cover': return renderCover();
    case 'featured': return renderFeatured(pageDef.data, pageDef.index);
    case 'toc': return renderToc();
    case 'region-intro': return renderRegionIntro(pageDef.region);
    case 'region-listing': return renderRegionListing(pageDef.region);
  }
  return '';
}

function showPage(idx, direction) {
  if (isFlipping) return;
  if (idx < 0 || idx >= pages.length) return;
  
  const book = document.getElementById('book');
  const oldPage = book.querySelector('.page.active');
  
  isFlipping = true;
  currentPage = idx;
  
  const newHtml = renderPage(pages[idx]);
  const wrapper = document.createElement('div');
  wrapper.innerHTML = newHtml;
  const newPage = wrapper.firstElementChild;
  
  if (oldPage) {
    if (direction === 'next') {
      oldPage.classList.add('flipping-out');
      newPage.classList.add('flipping-in', 'active');
    } else {
      oldPage.classList.add('flipping-out-back');
      newPage.classList.add('flipping-in-back', 'active');
    }
    book.appendChild(newPage);
    
    setTimeout(() => {
      if (oldPage.parentNode) oldPage.remove();
      newPage.classList.remove('flipping-in', 'flipping-in-back');
      isFlipping = false;
    }, 600);
  } else {
    newPage.classList.add('active');
    book.appendChild(newPage);
    isFlipping = false;
  }
  
  updateUI();
}

function nextPage() {
  if (currentPage < pages.length - 1) showPage(currentPage + 1, 'next');
}
function prevPage() {
  if (currentPage > 0) showPage(currentPage - 1, 'prev');
}
function goToPage(idx) {
  if (idx === currentPage) return;
  const direction = idx > currentPage ? 'next' : 'prev';
  showPage(idx, direction);
}

function updateUI() {
  document.getElementById('progress').textContent = `${String(currentPage + 1).padStart(2,'0')} / ${String(pages.length).padStart(2,'0')}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === pages.length - 1;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

// Event delegation for country pills
document.getElementById('book').addEventListener('click', (e) => {
  const pill = e.target.closest('.country-pill');
  if (pill) {
    setCountry(pill.dataset.region, pill.dataset.country);
  }
});

// Init
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('topBar').style.display = 'flex';
    showPage(0);
  }, 400);
});
</script>
